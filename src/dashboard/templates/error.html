<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ title }}</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem 3rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      text-align: center;
      max-width: 420px;
    }
    h2  { color: #dc2626; margin-bottom: .75rem; font-size: 1.2rem; }
    p   { color: #475569; font-size: .9rem; line-height: 1.6; }
    code {
      display: inline-block;
      background: #f1f5f9;
      padding: .3rem .75rem;
      border-radius: 6px;
      margin-top: .75rem;
      font-size: .9rem;
      color: #1e3a5f;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>⚠️ Parquet file not found</h2>
    <p>Run the data pipeline first, then refresh this page.</p>
    <br>
    <code>python main.py</code>
  </div>
</body>
</html>
